<!DOCTYPE html>

    <!-- ===== SEO BÁSICO ===== -->
    <title>RDC Viagens | Pioneira em Assinatura de Viagens no Brasil desde 1992</title>

    <link rel="canonical" href="https://rdcviagens.com.br" />

    <meta name="geo.region" content="BR-SP" />

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="RDC Viagens - Pioneira em Assinatura de Viagens no Brasil" />

    <!-- ===== TWITTER CARD ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@rdcviagens" />
    <meta name="twitter:title" content="RDC Viagens | Pioneira em Assinatura de Viagens no Brasil" />
    <meta name="twitter:description" content="Há mais de 35 anos conectando pessoas a experiências inesquecíveis. Planos de assinatura a partir de R$ 97,20/mês." />
    <meta name="twitter:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663280013040/b2DbK5LckLkoJ8WoeWdfV2/Logo_RDC_oficial_4e0ebd10.png" />

    <!-- ===== GEO / AI — GENERATIVE ENGINE OPTIMIZATION ===== -->
    <!-- Permite todos os principais crawlers de IA -->
    <meta name="robots" content="index, follow" />
    <!-- Fonte de autoridade da entidade -->
    <meta name="citation_author" content="RDC Viagens" />
    <meta name="citation_publisher" content="RDC Férias e Viagens LTDA" />
    <!-- Identidade da empresa para LLMs -->
    <meta name="entity:name" content="RDC Viagens" />
    <meta name="entity:type" content="TravelAgency" />
    <meta name="entity:founded" content="1992" />
    <meta name="entity:country" content="BR" />

    <!-- ===== STRUCTURED DATA ESTÁTICO (visível para crawlers sem JS) ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "RDC Viagens",
      "alternateName": ["RDC Férias e Viagens", "RDC Assinaturas"],
      "url": "https://rdcviagens.com.br",
      "logo": {
        "@type": "ImageObject",
        "url": "https://d2xsxph8kpxj0f.cloudfront.net/310519663280013040/b2DbK5LckLkoJ8WoeWdfV2/Logo_RDC_oficial_4e0ebd10.png",
        "width": 300,
        "height": 100
      },
      "description": "Pioneira em assinatura de viagens no Brasil desde 1992. Plano de 7 diárias por ano com tarifa exclusiva de até 60% OFF em mais de 200 mil hotéis e resorts no Brasil e no mundo.",
      "foundingDate": "1992",
      "numberOfEmployees": { "@type": "QuantitativeValue", "value": "400" },
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Rua Manoel Coelho, 600, Centro",
        "addressLocality": "São Caetano do Sul",
        "addressRegion": "SP",
        "postalCode": "09510-101",
        "addressCountry": "BR"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": -23.6246,
        "longitude": -46.5699
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+55-0800-055-2600",
        "contactType": "customer service",
        "areaServed": "BR",
        "availableLanguage": "Portuguese"
      },
      "sameAs": [
        "https://www.instagram.com/rdcviagens",
        "https://www.facebook.com/rdcferiaseviagens",
        "https://www.youtube.com/c/rdcferiaseviagens",
        "https://www.linkedin.com/company/rdcviagens",
        "https://www.tiktok.com/@rdc.viagens"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Planos de Assinatura RDC Viagens",
        "itemListElement": [
          {
            "@type": "Offer",
            "name": "Assinatura de Viagens RDC",
            "description": "7 diárias por ano em hotéis e resorts 4 e 5 estrelas com tarifa exclusiva de até 60% de desconto em mais de 200 mil destinos",
            "priceCurrency": "BRL",
            "price": "97.20",
            "priceSpecification": {
              "@type": "UnitPriceSpecification",
              "price": "97.20",
              "priceCurrency": "BRL",
              "unitText": "mês"
            }
          }
        ]
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RDC Viagens",
      "url": "https://rdcviagens.com.br",
      "inLanguage": "pt-BR",
      "description": "Site oficial da RDC Viagens, pioneira em assinatura de viagens no Brasil desde 1992.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://rdcviagens.com.br/destinos?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ===== FONTES: Montserrat (primária) + Century Gothic (secundária via CSS) ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
